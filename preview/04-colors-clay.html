<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 200px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="row">
  <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-clay-100);"></div>
    <div class="swatch-name">clay 100</div>
    <div class="swatch-label"><span>--pc-clay-100</span><span>tint</span></div>
  </div>
  <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-clay-300);"></div>
    <div class="swatch-name">clay 300</div>
    <div class="swatch-label"><span>--pc-clay-300</span><span></span></div>
  </div>
  <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-clay-500);"></div>
    <div class="swatch-name">clay 500</div>
    <div class="swatch-label"><span>--pc-clay-500</span><span>accent</span></div>
  </div>
  <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-clay-700);"></div>
    <div class="swatch-name">clay 700</div>
    <div class="swatch-label"><span>--pc-clay-700</span><span>press</span></div>
  </div>
  <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-clay-900);"></div>
    <div class="swatch-name">clay 900</div>
    <div class="swatch-label"><span>--pc-clay-900</span><span></span></div>
  </div>
</div>
</body></html>
