<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 220px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="row" style="gap:18px; align-items:flex-end;">

  <div class="col" style="flex:1; align-items:center; gap:10px;">
    <div style="width:100%; height:90px; background:var(--pc-bg-elevated); border-radius:8px; box-shadow:var(--pc-shadow-1);"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-shadow-1</div>
  </div>
  <div class="col" style="flex:1; align-items:center; gap:10px;">
    <div style="width:100%; height:90px; background:var(--pc-bg-elevated); border-radius:8px; box-shadow:var(--pc-shadow-2);"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-shadow-2</div>
  </div>
  <div class="col" style="flex:1; align-items:center; gap:10px;">
    <div style="width:100%; height:90px; background:var(--pc-bg-elevated); border-radius:8px; box-shadow:var(--pc-shadow-3);"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-shadow-3</div>
  </div>
  <div class="col" style="flex:1; align-items:center; gap:10px;">
    <div style="width:100%; height:90px; background:var(--pc-bg-elevated); border-radius:8px; box-shadow:var(--pc-shadow-4);"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-shadow-4</div>
  </div>
</div>
</body></html>
