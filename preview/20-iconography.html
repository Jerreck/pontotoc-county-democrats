<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 220px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:14px;">
  <div style="display:flex; gap:18px; align-items:center; flex-wrap:wrap;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:40px; height:40px; color:var(--pc-accent); font-size:28px; display:flex; align-items:center; justify-content:center;">★</div>
      <div style="font-size:11px; font-family:var(--pc-font-mono); color:var(--pc-fg-muted);">filled star</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:40px; height:40px; color:var(--pc-success); font-size:28px; display:flex; align-items:center; justify-content:center;">✓</div>
      <div style="font-size:11px; font-family:var(--pc-font-mono); color:var(--pc-fg-muted);">ballot check</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--pc-blue-700);"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
      </div>
      <div style="font-size:11px; font-family:var(--pc-font-mono); color:var(--pc-fg-muted);">lucide: calendar</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--pc-blue-700);"><path d="M12 21s-7-4.35-7-10a7 7 0 1 1 14 0c0 5.65-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/></svg>
      </div>
      <div style="font-size:11px; font-family:var(--pc-font-mono); color:var(--pc-fg-muted);">lucide: map-pin</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--pc-blue-700);"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div style="font-size:11px; font-family:var(--pc-font-mono); color:var(--pc-fg-muted);">lucide: users</div>
    </div>
  </div>
  <p style="margin:0; font-size:12px; color:var(--pc-fg-muted); max-width:60ch;">Stars and ballot‑checks are the only character glyphs used decoratively. UI icons come from Lucide at 1.75–2px stroke. Emoji are never used in product UI.</p>
</div>
</body></html>
