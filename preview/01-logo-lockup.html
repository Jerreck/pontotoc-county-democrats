<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 220px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div style="display:flex; gap:36px; align-items:center;">
  <img src="../assets/logo-mark.svg" width="120" height="120" alt="">
  <div style="display:flex; flex-direction:column; gap:8px;">
    <div style="font-family:var(--pc-font-display); font-size:36px; font-weight:700; color:var(--pc-blue-700); line-height:1.05; letter-spacing:-0.01em;">Pontotoc County</div>
    <div style="font-family:var(--pc-font-display); font-size:36px; font-weight:600; color:var(--pc-blue-700); font-style:italic; line-height:1.05;">Democrats</div>
    <div style="color:var(--pc-accent); font-weight:700; letter-spacing:6px; font-size:14px; margin-top:6px;">★ ★ ★ ★ ★</div>
  </div>
</div>
</body></html>
