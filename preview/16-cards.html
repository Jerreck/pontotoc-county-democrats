<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 280px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="row" style="gap:14px;">
  <div class="pc-card" style="flex:1;">
    <div class="pc-eyebrow">Upcoming event</div>
    <h3 style="font-family:var(--pc-font-display); font-size:22px; margin:6px 0 8px; color:var(--pc-ink-900);">October Monthly Meeting</h3>
    <p style="margin:0 0 12px; font-size:14px; color:var(--pc-ink-800);">Thursday, October 8 · 7:00pm · Agri‑Plex Hall B.</p>
    <button class="pc-btn pc-btn-primary" style="font-size:14px; padding:8px 14px;">RSVP</button>
  </div>
  <div class="pc-card" style="flex:1; background:var(--pc-blue-700); color:#f4ecdc; border-color:transparent;">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:.14em; font-weight:600; color:var(--pc-wheat-500);">From the chair</div>
    <h3 style="font-family:var(--pc-font-display); font-size:22px; margin:6px 0 8px; color:#fff; font-style:italic;">"We win by showing up — at coffee, at fairs, at every door on the block."</h3>
    <p style="margin:0; font-size:13px; color:#d6cfbf;">— Janet Caldwell, Chair</p>
  </div>
</div>
</body></html>
