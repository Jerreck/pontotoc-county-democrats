<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 200px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="row" style="gap:18px;">

  <div class="col" style="flex:1; align-items:flex-start;">
    <div style="width:100%; height:80px; background:var(--pc-blue-100); border:1px solid var(--pc-border); border-radius:4px;"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-r-sm · 4px</div>
    <div style="font-size:12px; color:var(--pc-fg-muted);">inputs · buttons</div>
  </div>
  <div class="col" style="flex:1; align-items:flex-start;">
    <div style="width:100%; height:80px; background:var(--pc-blue-100); border:1px solid var(--pc-border); border-radius:8px;"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-r-md · 8px</div>
    <div style="font-size:12px; color:var(--pc-fg-muted);">cards</div>
  </div>
  <div class="col" style="flex:1; align-items:flex-start;">
    <div style="width:100%; height:80px; background:var(--pc-blue-100); border:1px solid var(--pc-border); border-radius:16px;"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-r-lg · 16px</div>
    <div style="font-size:12px; color:var(--pc-fg-muted);">heroes</div>
  </div>
  <div class="col" style="flex:1; align-items:flex-start;">
    <div style="width:100%; height:80px; background:var(--pc-blue-100); border:1px solid var(--pc-border); border-radius:999px;"></div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">--pc-r-full · 999px</div>
    <div style="font-size:12px; color:var(--pc-fg-muted);">pills (rare)</div>
  </div>
</div>
</body></html>
