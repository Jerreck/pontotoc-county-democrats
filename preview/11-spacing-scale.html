<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 260px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:6px;">

  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-1</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">4px</div>
    <div style="height:14px; width:12px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-2</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">8px</div>
    <div style="height:14px; width:24px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-3</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">12px</div>
    <div style="height:14px; width:36px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-4</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">16px</div>
    <div style="height:14px; width:48px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-5</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">24px</div>
    <div style="height:14px; width:72px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-6</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">32px</div>
    <div style="height:14px; width:96px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-7</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">48px</div>
    <div style="height:14px; width:144px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
  <div style="display:grid; grid-template-columns: 70px 60px 1fr; gap:12px; align-items:center;">
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-s-8</div>
    <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-ink-800);">64px</div>
    <div style="height:14px; width:192px; background:var(--pc-blue-500); border-radius:2px;"></div>
  </div>
</div>
</body></html>
