<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 240px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:14px;">
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="pc-btn pc-btn-primary">Donate</button>
    <button class="pc-btn pc-btn-accent">RSVP for Oct 12</button>
    <button class="pc-btn pc-btn-secondary">Volunteer</button>
    <button class="pc-btn pc-btn-ghost">Learn more</button>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="pc-btn pc-btn-primary" style="padding:14px 22px; font-size:18px;">Donate</button>
    <button class="pc-btn pc-btn-secondary" style="padding:6px 12px; font-size:14px;">Small</button>
    <button class="pc-btn pc-btn-primary" disabled style="opacity:.5; cursor:not-allowed;">Disabled</button>
  </div>
  <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">primary · accent · secondary · ghost</div>
</div>
</body></html>
