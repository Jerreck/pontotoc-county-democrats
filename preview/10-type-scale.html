<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 380px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:6px;">
  
    <div style="display:grid; grid-template-columns: 100px 1fr; gap:14px; align-items:baseline; border-bottom:1px solid var(--pc-border); padding:2px 0;">
      <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-text-5xl</div>
      <div style="font-family:var(--pc-font-display); font-weight:600; font-size:78px; line-height:1.05; color:var(--pc-ink-900);">Pontotoc 5xl 78</div>
    </div>
    <div style="display:grid; grid-template-columns: 100px 1fr; gap:14px; align-items:baseline; border-bottom:1px solid var(--pc-border); padding:2px 0;">

      <div style="font-family:var(--pc-font-display); font-weight:600; font-size:60px; line-height:1.05; color:var(--pc-ink-900);">Pontotoc 4xl 60</div>
    </div>
    <div style="display:grid; grid-template-columns: 100px 1fr; gap:14px; align-items:baseline; border-bottom:1px solid var(--pc-border); padding:2px 0;">
      <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">--pc-text-3xl</div>
      <div style="font-family:var(--pc-font-display); font-weight:600; font-size:46px; line-height:1.05; color:var(--pc-ink-900);">Pontotoc 3xl 46</div>
    </div>
    <div style="display:grid; grid-template-columns: 100px 1fr; gap:14px; align-items:baseline; border-bottom:1px solid var(--pc-border); padding:2px 0;">

</body></html>
