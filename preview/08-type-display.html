<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 280px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:6px;">
  <div class="pc-eyebrow">Display — Newsreader</div>
  <div style="font-family:var(--pc-font-display); font-size:60px; font-weight:700; line-height:1.05; letter-spacing:-0.015em; color:var(--pc-ink-900);">Vote like a neighbor</div>
  <div style="font-family:var(--pc-font-display); font-size:28px; font-weight:600; font-style:italic; color:var(--pc-blue-700); line-height:1.1;">Pontotoc County, 2026</div>
  <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted); margin-top:6px;">700 / 600 / 600 italic · opsz variable · used for headlines, logo, pull quotes</div>
</div>
</body></html>
