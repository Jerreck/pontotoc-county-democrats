<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 280px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:8px;">
  <div class="pc-eyebrow">Body — Public Sans</div>
  <div style="font-family:var(--pc-font-body); font-size:22px; font-weight:600; color:var(--pc-ink-900);">Coffee at 6:30, business at 7.</div>
  <div style="font-family:var(--pc-font-body); font-size:16px; line-height:1.55; color:var(--pc-ink-800); max-width:60ch;">We meet the second Thursday at the Pontotoc County Agri‑Plex. New faces always welcome — bring a neighbor, bring questions, bring an idea you've been chewing on.</div>
  <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted); margin-top:6px;">300 / 400 / 500 / 600 / 700 · USWDS font · UI, body, captions, buttons</div>
</div>
</body></html>
