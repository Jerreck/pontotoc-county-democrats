<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 280px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:14px;">
  <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted);">Star row · divider</div>
  <div style="color:var(--pc-accent); font-weight:700; letter-spacing:18px; font-size:18px;">★ ★ ★ ★ ★</div>
  <div style="font-family:var(--pc-font-mono); font-size:11px; color:var(--pc-fg-muted); margin-top:8px;">Horizon stripe · header / footer base</div>
  <div style="height:90px; border-radius:8px; background: linear-gradient(var(--pc-blue-700), var(--pc-blue-700)) 0 0/100% calc(100% - 6px) no-repeat, linear-gradient(var(--pc-wheat-500), var(--pc-wheat-500)) 0 100%/100% 6px no-repeat; display:flex; align-items:center; padding:0 18px; color:#f4ecdc; font-family:var(--pc-font-display); font-style:italic; font-size:22px;">Red dirt below, big sky above.</div>
</div>
</body></html>
