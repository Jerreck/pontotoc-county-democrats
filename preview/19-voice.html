<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 280px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="row" style="gap:14px;">
  <div class="col" style="flex:1; padding:14px 16px; background:var(--pc-sage-100); border-radius:8px;">
    <div class="pc-eyebrow" style="color:var(--pc-sage-700);">✓ On brand</div>
    <p style="margin:6px 0 0; font-size:14px; color:var(--pc-ink-900);">We meet the second Thursday at the Agri‑Plex. Coffee at 6:30, business at 7. New faces always welcome.</p>
  </div>
  <div class="col" style="flex:1; padding:14px 16px; background:var(--pc-clay-100); border-radius:8px;">
    <div class="pc-eyebrow" style="color:var(--pc-clay-700);">✗ Off brand</div>
    <p style="margin:6px 0 0; font-size:14px; color:var(--pc-ink-900);">Join us for an exciting monthly gathering of likeminded individuals as we energize our movement! 🎉</p>
  </div>
</div>
</body></html>
