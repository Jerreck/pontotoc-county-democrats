<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 220px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:14px;">
  <div class="row">
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-wheat-100);"></div>
    <div class="swatch-name">wheat 100</div>
    <div class="swatch-label"><span>--pc-wheat-100</span><span></span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-wheat-300);"></div>
    <div class="swatch-name">wheat 300</div>
    <div class="swatch-label"><span>--pc-wheat-300</span><span></span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-wheat-500);"></div>
    <div class="swatch-name">wheat 500</div>
    <div class="swatch-label"><span>--pc-wheat-500</span><span>accent</span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-wheat-700);"></div>
    <div class="swatch-name">wheat 700</div>
    <div class="swatch-label"><span>--pc-wheat-700</span><span>press</span></div>
  </div>
  </div>
  <div class="row">
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-sage-100);"></div>
    <div class="swatch-name">sage 100</div>
    <div class="swatch-label"><span>--pc-sage-100</span><span></span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-sage-300);"></div>
    <div class="swatch-name">sage 300</div>
    <div class="swatch-label"><span>--pc-sage-300</span><span></span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-sage-500);"></div>
    <div class="swatch-name">sage 500</div>
    <div class="swatch-label"><span>--pc-sage-500</span><span>support</span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-sage-700);"></div>
    <div class="swatch-name">sage 700</div>
    <div class="swatch-label"><span>--pc-sage-700</span><span></span></div>
  </div>
  </div>
</div>
</body></html>
