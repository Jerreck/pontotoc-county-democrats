<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 260px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:14px; max-width:520px;">
  <label class="col" style="gap:4px;">
    <span style="font-size:13px; font-weight:600;">Full name</span>
    <input class="pc-input" value="Margaret Holloway" />
  </label>
  <label class="col" style="gap:4px;">
    <span style="font-size:13px; font-weight:600;">Email</span>
    <input class="pc-input" placeholder="you@example.com" />
  </label>
  <label class="col" style="gap:4px;">
    <span style="font-size:13px; font-weight:600;">Precinct</span>
    <select class="pc-input"><option>Precinct 1 — Ada North</option></select>
  </label>
</div>
</body></html>
