<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body.pc { background: var(--pc-bg); padding: 20px 22px; box-sizing: border-box; min-height: 220px; }
  .row { display:flex; gap: 14px; align-items: stretch; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .swatch { width: 100%; height: 64px; border-radius: 6px; border: 1px solid var(--pc-border); }
  .swatch-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--pc-fg-muted); font-family: var(--pc-font-mono); }
  .swatch-name { color: var(--pc-fg); font-weight: 600; font-family: var(--pc-font-body); font-size: 12px; }
</style>
</head><body class="pc">
<div class="col" style="gap:14px;">
  <div class="row">
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-bone-50);"></div>
    <div class="swatch-name">bone 50</div>
    <div class="swatch-label"><span>--pc-bone-50</span><span>page bg</span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-bone-100);"></div>
    <div class="swatch-name">bone 100</div>
    <div class="swatch-label"><span>--pc-bone-100</span><span>card bg</span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-bone-200);"></div>
    <div class="swatch-name">bone 200</div>
    <div class="swatch-label"><span>--pc-bone-200</span><span>hover</span></div>
  </div>
  </div>
  <div class="row">
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-ink-100);"></div>
    <div class="swatch-name">ink 100</div>
    <div class="swatch-label"><span>--pc-ink-100</span><span>border</span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-ink-400);"></div>
    <div class="swatch-name">ink 400</div>
    <div class="swatch-label"><span>--pc-ink-400</span><span>secondary</span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-ink-600);"></div>
    <div class="swatch-name">ink 600</div>
    <div class="swatch-label"><span>--pc-ink-600</span><span></span></div>
  </div>
    <div class="col" style="flex:1;">
    <div class="swatch" style="background:var(--pc-ink-900);"></div>
    <div class="swatch-name">ink 900</div>
    <div class="swatch-label"><span>--pc-ink-900</span><span>body</span></div>
  </div>
  </div>
</div>
</body></html>
